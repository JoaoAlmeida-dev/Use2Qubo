name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Build and test
        run: mvn -B clean verify

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: use2qubo-jar
          path: target/use2qubo-*.jar
          retention-days: 14
